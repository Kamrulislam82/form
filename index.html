<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <!-- tailwindcss cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>form</title>
</head>
<body>
    <!-- header content -->
    <header></header>
    <!-- main content -->
    <main>
         <!-- form content -->
          <div class="w-screen min-h-screen bg-amber-100 flex justify-center items-center">
            <div class="max-w-5xl w-full mx-auto flex flex-col md:flex-row lg:flex-row gap-3 bg-white p-5 rounded-xl shadow-2xl">
                <!-- logo -->
                <div class="w-full md:w-1/2 bg-[#E2ECFF] flex justify-center items-center rounded-md">
                    <div class="flex flex-col justify-center items-center p-10 text-center">
                        <img class="w-50 h-50 rounded-full ring-2" src="image/logo.png" alt="logo"/>
                        <h1 class="text-2xl font-bold py-2">Let us help you run your own platform</h1>
                        <p class="text-sm text-gray-600">our registration process quicker than other edtech platforms</p>
                    </div>
                </div>
                <!-- form -->
                <div class="w-full md:w-1/2 py-10">
                    <h1 class="text-2xl font-bold">Get Started</h1>
                    <p class="text-gray-600 pb-8">create your account now!</p>
                    <form action="#" class="grid grid-cols gap-4">
                        <div>
                            <label for="fName" class="text-gray-600 inline-block pb-4">Full Name</label>
                            <input class="w-full border border-gray-500 rounded-md px-4 py-2 text-black focus:outline-none" type="text" id="fName" name="fName" required placeholder="Enter your full name">
                        </div>
                        <div>
                            <label for="femail" class="text-gray-600 inline-block pb-4">Email</label>
                            <input class="w-full border border-gray-500 rounded-md px-4 py-2 text-black focus:outline-none" type="email" id="femail" name="femail" required placeholder="Enter your email">
                        </div>
                        <div>
                            <label for="password" class="text-gray-600 inline-block pb-4">Password</label>
                            <input class="w-full border border-gray-500 rounded-md px-4 py-2 text-black focus:outline-none" type="password" id="fpassword" name="fpassword" required placeholder="Enter your password">
                        </div>
                        <div>
                            <button class="bg-blue-500 text-white font-bold py-2 px-4 w-full rounded-sm" type="submit">Submit</button>
                        </div>
                    </form>
                    <p class="text-center pt-5">Already have an account? <a href="#" class="text-blue-500 hover:underline">Login here</a></p>
                </div>
            </div>
        </div>
    </main>
    <!-- footer content -->
    <footer></footer>
</body>
</html>
